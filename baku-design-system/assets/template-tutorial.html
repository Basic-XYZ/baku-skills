<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baku Tutorial</title>
  <style>
    :root {
      --ink: #161A22;
      --paper: #F7F4EA;
      --field: #E9E2D0;
      --green: #18A058;
      --blue: #2563EB;
      --amber: #D97706;
      --red: #D64B3A;
      --line: #D8D0BD;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font: 16px/1.7 "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 64px 0 96px; }
    .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 40px; align-items: end; min-height: 62vh; }
    h1 { margin: 0; font: 800 clamp(2.5rem, 6vw, 5rem)/1.05 "Noto Serif SC", serif; }
    .lead { max-width: 680px; margin: 24px 0 0; font-size: 1.08rem; color: #3D4350; }
    .panel { border: 1px solid var(--line); background: rgba(255,255,255,0.36); border-radius: 8px; padding: 28px; }
    .chip { display: inline-flex; padding: 6px 10px; border: 1px solid var(--line); border-radius: 999px; font-size: .82rem; background: var(--field); }
    .steps { display: grid; gap: 18px; margin-top: 72px; }
    .step { display: grid; grid-template-columns: 88px 1fr; gap: 18px; border-top: 1px solid var(--line); padding-top: 22px; }
    .num { font: 700 1.3rem/1 "JetBrains Mono", monospace; color: var(--green); }
    code { background: var(--field); padding: 2px 6px; border-radius: 4px; }
    @media (max-width: 820px) { .hero, .step { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <span class="chip">Baku Tutorial</span>
        <h1>把复杂流程拆成可验证步骤</h1>
        <p class="lead">这里放教程目标、适用对象和最终产物。文案要具体，少说愿景，多说读者完成后能拿到什么。</p>
      </div>
      <aside class="panel">
        <strong>完成标准</strong>
        <p>列出输入、命令、输出和验证方式。</p>
      </aside>
    </section>
    <section class="steps">
      <article class="step"><div class="num">01</div><div><h2>准备输入</h2><p>写明需要哪些文件、账号、数据或环境。</p></div></article>
      <article class="step"><div class="num">02</div><div><h2>执行动作</h2><p>给出命令或操作，命令用 <code>code</code> 样式。</p></div></article>
      <article class="step"><div class="num">03</div><div><h2>验证结果</h2><p>用可观察结果收尾，避免“应该可以了”。</p></div></article>
    </section>
  </main>
</body>
</html>
